# GitHub Actions — Arcade Timer 10s build pipeline
#
# Two jobs, both triggered on push to main and on PRs:
#   1. analyze-test  — runs flutter analyze + flutter test (no Android SDK needed)
#   2. build-apk     — compiles a release APK for sideloading on the Fire HD 8
#
# The APK is uploaded as a workflow artifact (90-day retention). Download
# it from the Actions tab on the run's summary page.

name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — analyze + test (no Android SDK required)
  # ---------------------------------------------------------------------------
  analyze-test:
    name: analyze + test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Flutter (3.44.1)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        # --no-fatal-infos: the project has 3 pre-existing lint infos
        # (prefer_const_constructors in admin_screen.dart). The CI
        # gates on errors and warnings, not infos. Local devs still
        # see the infos via `flutter analyze` without the flag.
        run: flutter analyze --no-fatal-infos

      - name: flutter test
        run: flutter test --no-pub --reporter=expanded

      - name: flutter build web (smoke test)
        run: flutter build web --release --no-tree-shake-icons

  # ---------------------------------------------------------------------------
  # Job 2 — build release APK for the Fire HD 8 kiosk
  # ---------------------------------------------------------------------------
  build-apk:
    name: build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: analyze-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Flutter (3.44.1)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: Patch usb_serial for AGP 9 compatibility
        # usb_serial uses the Android UsbManager API but still ships a
        # legacy Gradle build. The script rewrites the pub-cache copy
        # before the Gradle build runs.
        # Idempotent — re-runs are a no-op.
        run: bash scripts/patch_usb_serial.sh

      - name: Decode Android keystore (if configured)
        # If you want signed APKs, add these 3 secrets in
        # Settings → Secrets → Actions:
        #   ANDROID_KEYSTORE_BASE64  — base64-encoded .jks file
        #   ANDROID_KEYSTORE_PASSWORD
        #   ANDROID_KEY_ALIAS
        # Then uncomment the next 4 lines.
        # if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        # run: |
        #   echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
        #   echo "storePassword=$ANDROID_KEYSTORE_PASSWORD" > android/key.properties
        #   echo "keyPassword=$ANDROID_KEYSTORE_PASSWORD" >> android/key.properties
        #   echo "keyAlias=$ANDROID_KEY_ALIAS" >> android/key.properties
        run: echo "Unsigned APK build (no keystore configured)."

      - name: flutter build apk --release
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: arcade-timer-10s-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
          if-no-files-found: error
