name: arcade_timer_10s
description: "Arcade Timer 10s — kiosk game: stop a stopwatch at exactly 10.000s."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  usb_serial: ^0.5.0
  wakelock_plus: ^1.2.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # 7-segment LCD fonts (DSEG family, https://www.keshikan.net/fonts-e.html,
  # SIL Open Font License 1.1). Used for the chronograph digits on
  # the playing/result/waiting screens.
  fonts:
    - family: DSEG7Classic-Bold
      fonts:
        - asset: fonts/DSEG7-Classic/DSEG7Classic-Bold.ttf
    - family: DSEG7Classic-Light
      fonts:
        - asset: fonts/DSEG7-Classic/DSEG7Classic-Light.ttf
    - family: DSEG7Modern-Bold
      fonts:
        - asset: fonts/DSEG7-Modern/DSEG7Modern-Bold.ttf
    - family: DSEG7Modern-Regular
      fonts:
        - asset: fonts/DSEG7-Modern/DSEG7Modern-Regular.ttf
    - family: BungeeInline
      fonts:
        - asset: assets/fonts/BungeeInline-Regular.ttf
    - family: Bungee
      fonts:
        - asset: assets/fonts/Bungee-Regular.ttf
