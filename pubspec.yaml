name: arcade_timer_10s
description: "Arcade Timer 10s — kiosk game: stop a stopwatch at exactly 10.000s."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  usb_serial: ^0.5.0
  wakelock_plus: ^1.2.0
  shared_preferences: ^2.2.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # Asset bundle for the MaterialIcons font (Icons.settings, Icons.close,
  # Icons.power_settings_new, Icons.arrow_back, Icons.add, Icons.delete,
  # etc.). Without this entry, the web build ships an empty FontManifest
  # and every IconData renders as a fallback glyph (in Chromium that
  # glyph is the "tofu" box, on this kiosk it visually reads as a big X).
  #
  # The font file is provided by the Flutter SDK at
  #   packages/flutter_tools/lib/src/build_system/targets/web.dart
  # via the canonical SDK-relative path below. We declare it as a
  # package asset so the web bundler picks it up.
