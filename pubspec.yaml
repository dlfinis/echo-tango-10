name: arcade_timer_10s
description: "Arcade Timer 10s — kiosk game: stop a stopwatch at exactly 10.000s. Swappable themes (classic / Selección Colombia)."
publish_to: "none"
version: 0.2.2+3

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.0.0
  flutter_libserialport: ^0.6.0
  wakelock_plus: ^1.2.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/

  fonts:
    - family: DSEG7Classic-Bold
      fonts:
        - asset: assets/fonts/DSEG7Classic-Bold.ttf
    - family: DSEG7Classic-Light
      fonts:
        - asset: assets/fonts/DSEG7Classic-Light.ttf
    - family: DSEG7Modern-Bold
      fonts:
        - asset: assets/fonts/DSEG7Modern-Bold.ttf
    - family: DSEG7Modern-Regular
      fonts:
        - asset: assets/fonts/DSEG7Modern-Regular.ttf
    - family: BungeeInline
      fonts:
        - asset: assets/fonts/BungeeInline-Regular.ttf
    - family: Bungee
      fonts:
        - asset: assets/fonts/Bungee-Regular.ttf
